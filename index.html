<!DOCTYPE html>
<html>
<head>
  <title>Open Tabs</title>
</head>
<body>

<button onclick="openTabs()">Buka Semua Tab</button>

<script>
function openTabs() {
  const links = [
    "https://adlinksumo.com/azJHmXuO",
    "https://adlinksumo.com/C8hLD",
    "https://adlinksumo.com/cqeo3p",
    "https://adlinksumo.com/jUEIA9d",
    "https://adlinksumo.com/kNKn3sMq",
    "https://adlinksumo.com/COFcnA",
    "https://adlinksumo.com/D8xHc",
    "https://adlinksumo.com/pEAQ9ZG1",
    "https://adlinksumo.com/aWym",
    "https://adlinksumo.com/VcxJ1c2"
  ];

  links.forEach((url, index) => {
    setTimeout(() => {
      window.open(url, "_blank");
    }, index * 800);
  });
}
</script>

</body>
</html>
