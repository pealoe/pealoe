<!DOCTYPE html>
<html>
<head>
  <title>Open Tabs</title>
</head>
<body>
  <button onclick="openTabs()">Buka Semua Tab</button>

  <script>
    function openTabs() {
      const urls = [
        "https://adlinksumo.com/pAEscW",
        "https://adlinksumo.com/azJHmXuO",
        "https://www.youtube.com",
        "https://www.facebook.com"
      ];

      urls.forEach((url, i) => {
        setTimeout(() => window.open(url, "_blank"), i * 200);
      });
    }
  </script>
</body>
</html>
